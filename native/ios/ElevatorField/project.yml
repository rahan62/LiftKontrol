name: ElevatorField
options:
  bundleIdPrefix: com.elevatormaintenance
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
packages:
  supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.28.0
targets:
  ElevatorField:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ElevatorField
    dependencies:
      - package: supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.elevatormaintenance.field
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: ElevatorField/Info.plist
    configFiles:
      Debug: ElevatorField/Config/Debug.xcconfig
      Release: ElevatorField/Config/Release.xcconfig
